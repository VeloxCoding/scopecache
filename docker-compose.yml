services:
  scopecache:
    build: .
    container_name: scopecache
    environment:
      # Enable /guarded by setting a server-secret. Empty/unset would
      # disable /guarded (route returns 404). For the e2e harness we use
      # a fixed deterministic value so PHP-side and shell-side HMAC
      # computations match. See guardedflow.md §I.
      SCOPECACHE_SERVER_SECRET: ${SCOPECACHE_SERVER_SECRET:-test-secret}
    volumes:
      - scopecache-sock:/run

  caddyscope:
    build:
      context: .
      dockerfile: Dockerfile.caddyscope
    container_name: caddyscope
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    environment:
      SCOPECACHE_SERVER_SECRET: ${SCOPECACHE_SERVER_SECRET:-test-secret}
    ports:
      - "8081:8080"
    volumes:
      - ./Caddyfile.caddyscope:/etc/caddy/Caddyfile:ro

  dev:
    image: golang:1.26-alpine
    container_name: scopecache-dev
    working_dir: /src
    volumes:
      - .:/src
      - go-cache:/go/pkg/mod
      - scopecache-sock:/run
    command: ["sh", "-c", "apk add --no-cache curl jq && tail -f /dev/null"]
    stdin_open: true
    tty: true

volumes:
  go-cache:
  scopecache-sock:
