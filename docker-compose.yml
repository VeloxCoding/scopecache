services:
  scopecache:
    build: .
    container_name: scopecache
    volumes:
      - scopecache-sock:/run

  dev:
    image: golang:1.26-alpine
    container_name: scopecache-dev
    working_dir: /src
    volumes:
      - .:/src
      - go-cache:/go/pkg/mod
      - scopecache-sock:/run
    command: ["sh", "-c", "apk add --no-cache curl jq && tail -f /dev/null"]
    stdin_open: true
    tty: true

volumes:
  go-cache:
  scopecache-sock:
